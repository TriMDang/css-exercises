<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="odd">Number 1 - I'm a class!</p>
    <div id="two">Number 2 - I'm one ID.</div>
    <p class="odd" id="cooler">Number 3 - I'm a class, but cooler!</p>
    <div id="four">Number 4 - I'm another ID.</div>
    <p class="odd">Number 5 - I'm a class!</p>

    <!-- All odd numbers <p>, you could add an "odd" class to all <p> here:
      background-color: light red/pink;
      fonts: "Verdana, DejaVu Sans, sans-serif"
      -->
    <!-- Second element: ID two
      color: blue;
      font-size: 36px;
      -->
    <!-- third element: "odd" class with another class or id
     All property of "odd" class
     font-size: 24px;
      -->
    <!-- Fourth element: another ID four
     background-color: light-green;
     font-size: 24px,
     font-weight: 700;
      -->
    <!-- use non-keyword values (RGB, HEX, HSL)! -->
  </body>
</html>
